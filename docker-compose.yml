version: "3.9"

# BarroAiTrade — 전체 시스템 Docker Compose
# 사용: docker-compose up -d

networks:
  barro_net:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
  app_logs:
  pg_data:                 # BAR-56 — Postgres 영구 볼륨

services:
  # ── 백엔드 (FastAPI) ───────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: barro_backend
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      - LOG_LEVEL=INFO
      - TRADING_MODE=${TRADING_MODE:-simulation}
    volumes:
      - app_logs:/app/logs
    ports:
      - "8000:8000"
    networks:
      - barro_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      postgres:
        condition: service_healthy

  # ── Postgres + pgvector (BAR-56) ─────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg17
    container_name: barro_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-barro}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-barro}
      POSTGRES_DB: ${POSTGRES_DB:-barro}
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - barro_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-barro} -d ${POSTGRES_DB:-barro}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── 프론트엔드 (Next.js) ──────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: barro_frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
      - NEXT_PUBLIC_WS_URL=ws://backend:8000
    ports:
      - "3000:3000"
    networks:
      - barro_net
    depends_on:
      backend:
        condition: service_healthy

  # ── Prometheus (메트릭 수집) ─────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: barro_prometheus
    restart: unless-stopped
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    networks:
      - barro_net

  # ── Grafana (모니터링 대시보드) ──────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: barro_grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-barro1234}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3001
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"
    networks:
      - barro_net
    depends_on:
      - prometheus
